<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroMart - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-2">
        <div class="row rounded shadow bg-white ">

            <div class="col-12 col-lg-6 d-flex flex-column justify-content-between p-5 text-white"
                style="background: linear-gradient(to bottom, #011f5a, #000F30);">

                <div>
                    <a href="index.html"><img style="height: 30px; width: auto;" src="logo.png" alt="Brand Logo"
                            class="mb-4"></a>

                    <h1 class="fw-bold mb-3" style="font-size: 40px;">
                        Reset Your <br><span class="text-warning">Password</span>
                    </h1>
                    <p class="text-white-75" style="font-size: 16px;">
                        Create a new strong password <br>to secure your account.
                    </p>
                </div>

                <div class="text-center my-4">
                    <img src="heroImage.png" alt="Featured Electronics" class="img-fluid"
                        style="max-height: 250px; object-fit: contain;">
                </div>

                <div class="row g-3  text-center rounded-4" style="background-color: #0C1C3B;">
                    <div class="col-4">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <span class="fs-3">🛡️</span>
                            <div class="text-start">
                                <p class="fw-bold mb-0 small text-white">Secure</p>
                                <p class="text-white-50" style="font-size: 11px;">Shopping</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <span class="fs-3">✨</span>
                            <div class="text-start">
                                <p class="fw-bold mb-0 small text-white">100%</p>
                                <p class="text-white-50 " style="font-size: 11px;">Authentic</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <span class="fs-3">📞</span>
                            <div class="text-start">
                                <p class="fw-bold mb-0 small text-white">24/7</p>
                                <p class="text-white-50" style="font-size: 11px;">Support</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6 d-flex align-items-center">
                <div class="w-100 p-4 ">

                    <h2 class="fw-bold mb-1" style="font-size: 24px;"> Reset<span class="text-primary">Password</span>
                    </h2>
                    <p class="text-muted small">Enter and confirm your new password to reset your password</p>

                    <form action=" ">
                        <div>
                            <label for="name" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" placeholder="Enter Your Email">
                            <p id="eError" class="text-danger"></p>
                        </div>

                        <div>
                            <label for="" class="form-label">New Password</label>
                            <input id="pass1" type="password" class="form-control" placeholder="Enter new password">
                            <p id="pass1msg" class="text-danger"></p>
                        </div>

                        <div>
                            <label for="" class="form-label">Confirm Password</label>
                            <input id="pass2" type="password" class="form-control" placeholder="Confirm new password">
                            <p id="pass2msg" class="text-danger"></p>
                        </div>


                        <button onclick="validate(event)" type="submit"
                            class="btn btn-primary w-100 py-2 fw-medium fs-6 shadow-sm">Update Password</button>

                        <a class="small text-decoration-none d-flex text-primary mt-3 justify-content-center fw-medium"
                            href="login.html">Back to Login</a>
                    </form>

                </div>
            </div>

        </div>
    </div>



    <script>


        function validate(e) {

            let email = document.getElementById("email").value;

            let pass1 = document.getElementById("pass1").value;

            let pass2 = document.getElementById("pass2").value;

            e.preventDefault()

            if (email.includes("@")) {
                document.getElementById("eError").innerHTML = ""
            }
            else {
                document.getElementById("eError").innerHTML = "Invalid Email"
            }

            if (pass1 == "") {
                document.getElementById("pass1msg").innerHTML = "Enter Password"
            }
            else {
                document.getElementById("pass1msg").innerHTML = ""
            }

            if (pass1.length <= 8) {
                document.getElementById("pass1msg").innerHTML = "Password Minimum 8 Characters"
            }
            else {
                document.getElementById("pass1msg").innerHTML = ""
            }

            if (pass1 != pass2) {
                document.getElementById("pass2msg").innerHTML = "Password Not Match"
            }
            else {
                document.getElementById("pass2msg").innerHTML = ""
            }

            if (email != "" && document.getElementById("pass2msg").innerHTML == "" && document.getElementById("cError").innerHTML == "") {
                alert("Password Chhanged");
            }

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
