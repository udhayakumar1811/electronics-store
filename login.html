<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroMart - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-2">
        <div class="row rounded shadow bg-white ">

            <div class="col-12 col-lg-6 d-flex flex-column justify-content-between p-5 text-white"
                style="background: linear-gradient(to bottom, #011f5a, #000F30);">

                <div>
                    <a href="index.html"><img style="height: 30px; width: auto;" src="logo.png" alt="Brand Logo"
                            class="mb-4"></a>

                    <h1 class="fw-bold mb-3" style="font-size: 40px;">
                        Welcome <span class="text-warning">Back!</span>
                    </h1>
                    <p class="text-white-75" style="font-size: 16px;">
                        Login to your account and explore <br>the best electronics at best prices.
                    </p>
                </div>

                <div class="text-center my-4">
                    <img src="heroImage.png" alt="Featured Electronics" class="img-fluid"
                        style="max-height: 250px; object-fit: contain;">
                </div>

                <div class="row g-3  text-center rounded-4" style="background-color: #0C1C3B;">
                    <div class="col-4">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <span class="fs-3">🛡️</span>
                            <div class="text-start">
                                <p class="fw-bold mb-0 small text-white">Secure</p>
                                <p class="text-white-50" style="font-size: 11px;">Shopping</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <span class="fs-3">✨</span>
                            <div class="text-start">
                                <p class="fw-bold mb-0 small text-white">100%</p>
                                <p class="text-white-50 " style="font-size: 11px;">Authentic</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <span class="fs-3">📞</span>
                            <div class="text-start">
                                <p class="fw-bold mb-0 small text-white">24/7</p>
                                <p class="text-white-50" style="font-size: 11px;">Support</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6 d-flex align-items-center">
                <div class="w-100 p-4 ">
                    <h2 class="fw-bold mb-1" style="font-size: 24px;">Login to <span
                            class="text-primary">ElectroMart</span></h2>
                    <p class="text-muted small">Don't have an account? <a
                            class="text-primary text-decoration-none fw-medium" href="SignUp.html">Sign Up</a></p>

                    <form action=" ">
                        <div>
                            <label for="name" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" placeholder="Enter Your Email">
                            <p id="eError" class="text-danger"></p>
                        </div>

                        <div>
                            <label for="" class="form-label">Password</label>
                            <input id="pass1" type="password" class="form-control" placeholder="Enter password">
                            <p id="pass1msg" class="text-danger"></p>
                        </div>

                        <div class="text-end mb-4">
                            <a class="text-primary text-decoration-none small fw-medium" href="Change Password.html">Forgot Password?</a>
                        </div>

                        <button onclick="validate(event)" type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-6 shadow-sm">Login</button>
                    </form>

                    <div class="d-flex align-items-center my-4">
                        <hr class="flex-grow-1 m-0 text-muted">
                        <span class="mx-3 text-muted small text-uppercase fw-semibold">or</span>
                        <hr class="flex-grow-1 m-0 text-muted">
                    </div>

                    <div class="d-flex gap-3 mb-4">
                        <button
                            class="btn btn-outline-secondary py-2 w-50 d-flex align-items-center justify-content-center gap-2 shadow-sm"><img src="" alt=""> <span class="fw-medium small">Google</span>
                        </button>
                        <button
                            class="btn btn-outline-secondary py-2 w-50 d-flex align-items-center justify-content-center gap-2 shadow-sm"><img src="" alt=""> <span class="fw-medium small">Facebook</span>
                        </button>
                    </div>

                    <p class="text-muted text-center small mb-0 mt-2">Your data is safe and encrypted</p>
                </div>
            </div>

        </div>
    </div>


    
    <script>


        function validate(e) {

            let email = document.getElementById("email").value;

            let pass1 = document.getElementById("pass1").value;

            e.preventDefault()

            if (email.includes("@")) {
                document.getElementById("eError").innerHTML = ""
            }
            else {
                document.getElementById("eError").innerHTML = "Invalid Email"
            }
            

            if (pass1 == "") {
                document.getElementById("pass1msg").innerHTML = "Enter Password"
            }
            else {
                document.getElementById("pass1msg").innerHTML = ""
            }
           


            if (email != "" && document.getElementById("pass1msg").innerHTML == "") {
                alert("Login Successfully");
            }

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
